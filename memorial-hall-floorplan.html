<!DOCTYPE html>
<html lang="en" class="exp-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Memorial Hall Studio — Interactive Studio Plan</title>
<style>
  :root{
    --bg:oklch(0.985 0 0);--card:oklch(1 0 0);--fg:oklch(0.22 0.01 260);
    --muted:oklch(0.55 0.01 260);--border:oklch(0.9 0.005 260);
    --ring:oklch(0.55 0.13 250);--accent:oklch(0.55 0.13 250);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:oklch(0.2 0.01 260);--card:oklch(0.24 0.01 260);--fg:oklch(0.96 0 0);
      --muted:oklch(0.7 0.01 260);--border:oklch(0.32 0.01 260);
      --ring:oklch(0.7 0.13 250);--accent:oklch(0.7 0.13 250);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  #exp-app{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
  header.exp-bar{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--card);z-index:80}
  header.exp-bar h1{font-size:14px;font-weight:600;margin:0;letter-spacing:-0.01em}
  header.exp-bar .exp-sub{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  header.exp-bar .exp-actions{margin-left:auto;display:flex;gap:8px}
  .exp-btn{font-size:12px;font-weight:500;color:var(--fg);background:transparent;border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer}
  .exp-btn:hover{border-color:var(--ring)}
  #exp-stage{position:relative;flex:1;overflow:hidden;touch-action:none;cursor:grab}
  #exp-stage.is-panning{cursor:grabbing}
  #exp-world{position:absolute;left:0;top:0;width:920px;height:680px;transform-origin:0 0;
    background:var(--card);
    background-image:
      linear-gradient(to right, var(--border) 1px, transparent 1px),
      linear-gradient(to bottom, var(--border) 1px, transparent 1px),
      linear-gradient(to right, color-mix(in oklch, var(--border), transparent 45%) 1px, transparent 1px),
      linear-gradient(to bottom, color-mix(in oklch, var(--border), transparent 45%) 1px, transparent 1px);
    background-size:100px 100px,100px 100px,20px 20px,20px 20px;
    box-shadow:0 1px 3px rgba(0,0,0,.15)}
  #exp-world.is-animating{transition:transform .5s cubic-bezier(.22,.61,.36,1)}
  /* Section highlight regions */
  .exp-region{position:absolute;left:0;top:0;border-radius:8px;border:2px solid var(--accent);
    background:color-mix(in oklch, var(--accent), transparent 88%);opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:6}
  .exp-region.is-active{opacity:1}
  /* Object spotlight when a section is focused */
  .exp-obj{transition:opacity .35s ease}
  .exp-obj>div{transition:box-shadow .35s ease}
  #exp-world.is-focused .exp-obj:not(.is-lit){opacity:.26}
  #exp-world.is-focused .exp-obj.is-lit>div{box-shadow:0 0 0 2px var(--accent),0 0 16px color-mix(in oklch, var(--accent), transparent 42%)}
  /* Section markers */
  .exp-marker{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:9999px;border:1px solid var(--border);
    background:color-mix(in oklch, var(--card), transparent 4%);color:var(--fg);font-size:11px;font-weight:600;cursor:pointer;
    box-shadow:0 1px 2px rgba(0,0,0,.12);white-space:nowrap;transition:transform .1s ease, box-shadow .2s ease, border-color .2s ease;backdrop-filter:blur(4px)}
  .exp-marker:hover{border-color:var(--ring)}
  .exp-marker .exp-marker-dot{width:8px;height:8px;border-radius:9999px;background:var(--accent);flex:none}
  .exp-marker.is-active{border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in oklch, var(--ring), transparent 78%)}
  /* Active label lifted into screen space, gliding above its description */
  .exp-marker.is-floating{transition:left .5s cubic-bezier(.22,.61,.36,1),top .5s cubic-bezier(.22,.61,.36,1),box-shadow .2s ease,border-color .2s ease}
  /* Description panel — floats directly under the active label */
  #exp-panel{position:absolute;left:0;top:0;z-index:90;width:min(320px,calc(100% - 24px));background:var(--card);
    border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.28);padding:16px;
    display:flex;flex-direction:column;gap:8px;opacity:0;pointer-events:none;transform:translateY(6px);transition:opacity .3s ease, transform .3s ease}
  #exp-panel.is-open{opacity:1;pointer-events:auto;transform:translateY(0)}
  #exp-panel h2{margin:0;font-size:16px;font-weight:650;letter-spacing:-0.01em;line-height:1.25;text-wrap:balance;padding-right:20px}
  #exp-panel p{margin:0;font-size:13px;line-height:1.6;color:var(--muted);white-space:pre-wrap}
  #exp-panel .exp-eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #exp-panel .exp-close{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:6px;border:1px solid var(--border);
    background:transparent;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center}
  #exp-panel .exp-close:hover{color:var(--fg);border-color:var(--ring)}
  /* Sections nav */
  #exp-nav{position:absolute;top:16px;left:16px;z-index:85;background:color-mix(in oklch, var(--card), transparent 6%);border:1px solid var(--border);
    border-radius:10px;padding:6px;max-width:220px;max-height:calc(100% - 32px);overflow:auto;backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
  #exp-nav .exp-nav-title{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:4px 8px 6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .exp-nav-item{display:block;width:100%;text-align:left;font-size:12px;color:var(--fg);background:transparent;border:none;border-radius:6px;padding:6px 8px;cursor:pointer}
  .exp-nav-item:hover{background:color-mix(in oklch, var(--ring), transparent 88%)}
  .exp-nav-item.is-active{background:color-mix(in oklch, var(--ring), transparent 82%);font-weight:600}
  .exp-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:82;font-size:11px;color:var(--muted);
    background:color-mix(in oklch, var(--card), transparent 8%);border:1px solid var(--border);border-radius:9999px;padding:5px 12px;backdrop-filter:blur(4px);pointer-events:none}
  /* Zoom controls */
  #exp-zoom{position:absolute;right:16px;bottom:16px;z-index:84;display:flex;flex-direction:column;gap:4px}
  #exp-zoom button{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:color-mix(in oklch, var(--card), transparent 6%);
    color:var(--fg);font-size:18px;line-height:1;cursor:pointer;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center}
  #exp-zoom button:hover{border-color:var(--ring)}
</style>
</head>

<script>
(function(){
  var WORLD_W=920, WORLD_H=680;
  var stage=document.getElementById("exp-stage");
  var world=document.getElementById("exp-world");
  var panel=document.getElementById("exp-panel");
  var pTitle=document.getElementById("exp-panel-title");
  var pBody=document.getElementById("exp-panel-body");
  var markers=[].slice.call(document.querySelectorAll(".exp-marker"));
  var navItems=[].slice.call(document.querySelectorAll(".exp-nav-item"));
  var regions=[].slice.call(document.querySelectorAll(".exp-region"));
  var objs=[].slice.call(document.querySelectorAll(".exp-obj"));
  var hint=document.querySelector(".exp-hint");
  var activeIndex=null;
  var floatingMarker=null;
  var view={s:1,tx:0,ty:0};

  function fitScale(){
    var r=stage.getBoundingClientRect();
    return Math.min(r.width/WORLD_W, r.height/WORLD_H)*0.94;
  }
  function clampScale(s){ return Math.max(fitScale()*0.5, Math.min(s, fitScale()*10)); }
  function render(animate){
    world.classList.toggle("is-animating", !!animate);
    world.style.transform="translate("+view.tx+"px,"+view.ty+"px) scale("+view.s+")";
    if(activeIndex!=null) layout();
  }
  function fit(){
    var r=stage.getBoundingClientRect();
    view.s=fitScale();
    view.tx=(r.width-WORLD_W*view.s)/2;
    view.ty=(r.height-WORLD_H*view.s)/2;
    render(true);
  }
  function num(v){ var n=parseFloat(v); return isNaN(n)?null:n; }
  // Returns the label box, the highlight region (if any), and the union
  // "fit" box (world px). Fitting the union keeps the label on-screen even
  // when it sits outside its region.
  function boxes(m){
    var lx=num(m.getAttribute("data-cx")), ly=num(m.getAttribute("data-cy"));
    var lw=m.offsetWidth, lh=m.offsetHeight;
    var label={x:lx,y:ly,w:lw,h:lh};
    var rx=num(m.getAttribute("data-rx"));
    if(rx!=null){
      var reg={x:rx,y:num(m.getAttribute("data-ry")),w:num(m.getAttribute("data-rw")),h:num(m.getAttribute("data-rh"))};
      var minx=Math.min(lx,reg.x), miny=Math.min(ly,reg.y);
      var maxx=Math.max(lx+lw,reg.x+reg.w), maxy=Math.max(ly+lh,reg.y+reg.h);
      return {label:label, region:reg, hasRegion:true, fit:{x:minx,y:miny,w:maxx-minx,h:maxy-miny}};
    }
    return {label:label, region:null, hasRegion:false, fit:{x:lx-60,y:ly-40,w:lw+120,h:lh+90}};
  }
  // Vertical gaps for the stacked [label] / [description] / (region) layout.
  var TOP_MARGIN=14, GAP_LABEL_PANEL=6, GAP_PANEL_REGION=14, BOTTOM_MARGIN=18;
  function focusIndex(i){
    var m=markers[i]; if(!m) return;
    var r=stage.getBoundingClientRect();
    var b=boxes(m);
    // Open first so the panel + floated label have measurable sizes.
    openPanel(i);
    lightUp(i, b);
    var ph=panel.offsetHeight;
    var lh=floatingMarker?floatingMarker.offsetHeight:26;
    // Height reserved above the region for the label + description stack.
    var stack=TOP_MARGIN+lh+GAP_LABEL_PANEL+ph+GAP_PANEL_REGION;
    if(b.hasRegion){
      var reg=b.region;
      var availH=Math.max(80, r.height-stack-BOTTOM_MARGIN);
      var availW=r.width*0.74;
      view.s=clampScale(Math.min(availW/reg.w, availH/reg.h));
      view.tx=r.width/2 - (reg.x+reg.w/2)*view.s;
      // Push the region down so its TOP sits just below the reserved stack.
      view.ty=stack - reg.y*view.s;
    } else {
      // No region: zoom on the label and leave room for the panel below it.
      view.s=clampScale(fitScale()*2.2);
      var lx=num(m.getAttribute("data-cx")), ly=num(m.getAttribute("data-cy"));
      view.tx=r.width/2 - lx*view.s;
      view.ty=stack - ly*view.s;
    }
    render(true);
  }
  function lightUp(i, b){
    regions.forEach(function(rg){ rg.classList.toggle("is-active", num(rg.getAttribute("data-index"))===i); });
    if(b && b.hasRegion){
      var reg=b.region;
      world.classList.add("is-focused");
      objs.forEach(function(o){
        var ox=num(o.getAttribute("data-cx")), oy=num(o.getAttribute("data-cy"));
        var inside=ox>=reg.x && ox<=reg.x+reg.w && oy>=reg.y && oy<=reg.y+reg.h;
        o.classList.toggle("is-lit", inside);
      });
    } else {
      world.classList.remove("is-focused");
      objs.forEach(function(o){ o.classList.remove("is-lit"); });
    }

  // to a fixed spot above the description panel.
  function floatMarker(m){
    unfloatMarker();
    var sr=stage.getBoundingClientRect();
    var mr=m.getBoundingClientRect();
    m.style.position="absolute";
    m.style.left=(mr.left-sr.left)+"px";
    m.style.top=(mr.top-sr.top)+"px";
    m.style.transform="none";
    m.style.zIndex="95";
    m.classList.add("is-floating");
    stage.appendChild(m);
    floatingMarker=m;
  }
  function unfloatMarker(){
    if(!floatingMarker) return;
    var m=floatingMarker;
    m.classList.remove("is-floating");
    m.style.position="absolute";
    m.style.left="0"; m.style.top="0"; m.style.zIndex="60";
    m.style.transform="translate("+num(m.getAttribute("data-cx"))+"px,"+num(m.getAttribute("data-cy"))+"px)";
    world.appendChild(m);
    floatingMarker=null;
  }
  function openPanel(i){
    activeIndex=i;
    var m=markers[i];
    pTitle.textContent=m.getAttribute("data-title")||"Untitled section";
    var body=m.getAttribute("data-body")||"";
    pBody.textContent=body;
    pBody.style.display=body?"block":"none";
    panel.classList.add("is-open");
    markers.forEach(function(x,j){ x.classList.toggle("is-active", j===i); });
    navItems.forEach(function(x,j){ x.classList.toggle("is-active", j===i); });
    if(hint) hint.style.display="none";
    floatMarker(m);
  }
  // Stack the floated label directly above the description panel, with the
  // panel's bottom edge held above the highlighted region so it never covers it.
  function layout(){
    if(activeIndex==null) return;
    var m=markers[activeIndex];
    var r=stage.getBoundingClientRect();
    var pw=panel.offsetWidth, ph=panel.offsetHeight;
    var anchorX, anchorTop;
    var rx=num(m.getAttribute("data-rx"));
    if(rx!=null){
      anchorX=view.tx+(rx+num(m.getAttribute("data-rw"))/2)*view.s;
      anchorTop=view.ty+num(m.getAttribute("data-ry"))*view.s;
    } else {
      var lx=num(m.getAttribute("data-cx")), ly=num(m.getAttribute("data-cy"));
      anchorX=view.tx+lx*view.s;
      anchorTop=view.ty+ly*view.s;
    }
    // Panel sits above the region top, horizontally centered on it.
    var panelLeft=Math.max(8, Math.min(anchorX-pw/2, r.width-pw-8));
    var panelTop=Math.max(8, anchorTop-GAP_PANEL_REGION-ph);
    panel.style.left=panelLeft+"px";
    panel.style.top=panelTop+"px";
    // Floated label glides just above the panel.
    if(floatingMarker){
      var lw=floatingMarker.offsetWidth, lh=floatingMarker.offsetHeight;
      floatingMarker.style.left=Math.max(8, Math.min(anchorX-lw/2, r.width-lw-8))+"px";
      floatingMarker.style.top=Math.max(8, panelTop-GAP_LABEL_PANEL-lh)+"px";
    }
  }
  function closePanel(){
    activeIndex=null;
    unfloatMarker();
    panel.classList.remove("is-open");
    world.classList.remove("is-focused");
    objs.forEach(function(o){ o.classList.remove("is-lit"); });
    regions.forEach(function(rg){ rg.classList.remove("is-active"); });
    markers.forEach(function(x){ x.classList.remove("is-active"); });
    navItems.forEach(function(x){ x.classList.remove("is-active"); });
    if(hint) hint.style.display="";
  }
  function zoomAt(px,py,factor){
    var ns=clampScale(view.s*factor);
    var k=ns/view.s;
    view.tx=px-(px-view.tx)*k;
    view.ty=py-(py-view.ty)*k;
    view.s=ns;
    render(false);
  }

  markers.forEach(function(m,i){ m.addEventListener("click", function(e){ e.stopPropagation(); focusIndex(i); }); });
  navItems.forEach(function(n,i){ n.addEventListener("click", function(e){ e.stopPropagation(); focusIndex(i); }); });
  document.getElementById("exp-close").addEventListener("click", function(){ closePanel(); fit(); });
  document.getElementById("exp-reset").addEventListener("click", function(){ closePanel(); fit(); });
  window.addEventListener("keydown", function(e){ if(e.key==="Escape"){ closePanel(); fit(); } });

  document.getElementById("exp-zoom-in").addEventListener("click", function(){
    var r=stage.getBoundingClientRect(); zoomAt(r.width/2, r.height/2, 1.25);
  });
  document.getElementById("exp-zoom-out").addEventListener("click", function(){
    var r=stage.getBoundingClientRect(); zoomAt(r.width/2, r.height/2, 0.8);
  });
  // Pointer drag to pan.
  var dragging=false, moved=false, sx=0, sy=0, stx=0, sty=0, pid=null;
  stage.addEventListener("pointerdown", function(e){
    if(e.target.closest(".exp-marker")||e.target.closest("#exp-nav")||e.target.closest("#exp-panel")||e.target.closest("#exp-zoom")) return;
    dragging=true; moved=false; pid=e.pointerId;
    sx=e.clientX; sy=e.clientY; stx=view.tx; sty=view.ty;
    stage.classList.add("is-panning");
    try{ stage.setPointerCapture(e.pointerId); }catch(_){}
  });
  stage.addEventListener("pointermove", function(e){
    if(!dragging) return;
    var dx=e.clientX-sx, dy=e.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>3) moved=true;
    view.tx=stx+dx; view.ty=sty+dy;
    render(false);
  });
  function endDrag(){
    if(!dragging) return;
    dragging=false;
    stage.classList.remove("is-panning");
    try{ stage.releasePointerCapture(pid); }catch(_){}
  }
  stage.addEventListener("pointerup", endDrag);
  stage.addEventListener("pointercancel", endDrag);
  stage.addEventListener("click", function(e){
    if(moved) return;
    if(e.target===stage||e.target===world){ closePanel(); }
  });

  var rt;
  window.addEventListener("resize", function(){
    clearTimeout(rt);
    rt=setTimeout(function(){ if(activeIndex!=null) focusIndex(activeIndex); else fit(); }, 120);
  });
  fit();
})();
</script>
</body>
</html>
